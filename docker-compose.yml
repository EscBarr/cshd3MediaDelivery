  minio:
    build:
      context: .
      dockerfile: Dockerfile.minio
    container_name: minio
    networks:
      - media
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"

networks:
  media:
    driver: bridge

volumes:
  minio-data: